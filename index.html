<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thathsarani Navodya | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --accent: #c8a96e;
            --accent2: #7c6aff;
            --text: #e8e8f0;
            --muted: #7a7a8c;
            --border: rgba(200,169,110,0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        html { 
            scroll-behavior: smooth; 
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1.2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .nav-links { 
            display: flex; 
            gap: 2.5rem; 
            list-style: none; 
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .nav-links a:hover { 
            color: var(--accent); 
        }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 4rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,106,255,0.15) 0%, transparent 70%);
            animation: pulse 6s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px; left: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(200,169,110,0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .hero-content { 
            max-width: 700px; animation: fadeUp 1s ease both; 
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-tag {
            display: inline-block;
            background: rgba(200,169,110,0.1);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 7vw, 5.5rem);
            line-height: 1.05;
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .hero h1 span { 
            color: var(--accent); 
        }

        .hero p {
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 520px;
            margin: 0 auto 2.5rem;
        }

        .hero-btns { 
            display: flex; 
            gap: 1rem; 
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.85rem 2rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0f;
            font-weight: 600;
            border: none;
        }

        .btn-primary:hover { 
            background: #d4b97e; 
            transform: translateY(-2px); 
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover { 
            border-color: var(--accent); 
            color: var(--accent); 
            transform: translateY(-2px); 
        }

        /* SECTIONS */
        section { padding: 6rem 4rem; }

        .section-label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 3rem;
            font-weight: 700;
        }

        /* ABOUT */
        #about { 
            background: var(--surface); 
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-img-wrap {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
        }

        .about-img-wrap img {
            width: 100%;
            height: 450px;
            border-radius: 8px;
            display: block;
            object-fit: cover;
            object-position: center top;
            filter: grayscale(20%);
        }

        .about-img-wrap::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px;
            right: -12px; bottom: -12px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            z-index: -1;
        }

        .about-text p {
            color: var(--muted);
            line-height: 1.9;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .about-facts {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .fact {
            text-align: center;
            padding: 1.2rem;
            background: rgba(200,169,110,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            flex: 1;
        }

        .fact-num {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent);
            font-weight: 700;
        }

        .fact-label { 
            font-size: 0.75rem; 
            color: var(--muted); 
            margin-top: 0.3rem; 
        }

        /* SKILLS */
        #skills { 
            background: var(--bg); 
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        .skill-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
            cursor: default;
        }

        .skill-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            background: rgba(200,169,110,0.05);
        }

        .skill-icon { 
            font-size: 2rem; 
            margin-bottom: 0.8rem; 
        }

        .skill-name { 
            font-size: 0.9rem; 
            font-weight: 500; 
        }

        /* PROJECTS */
        #projects {
            background: var(--surface);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .project-tag {
            display: inline-block;
            background: rgba(200,169,110,0.1);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .project-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
        }

        .project-card p {
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tech-badge {
            background: rgba(124,106,255,0.1);
            border: 1px solid rgba(124,106,255,0.3);
            color: var(--accent2);
            padding: 0.25rem 0.7rem;
            border-radius: 4px;
            font-size: 0.78rem;
        }

        .project-links {
            display: flex;
            gap: 1rem;
        }

        .project-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .project-link:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* EDUCATION */
        #education { 
            background: var(--surface); 
        }

        .edu-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .edu-table th {
            background: rgba(200,169,110,0.1);
            color: var(--accent);
            padding: 1rem 1.5rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .edu-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--muted);
            vertical-align: top;
        }

        .edu-table td:first-child { 
            color: var(--text); 
            font-weight: 500; 
        }

        .edu-table tr:hover td { 
            background: rgba(200,169,110,0.03); 
        }

        /* ACHIEVEMENTS */
        #achievements { 
            background: var(--bg); 
        }

        .achievements-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .achievements-list li {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            transition: border-color 0.3s;
        }

        .achievements-list li:hover { 
            border-color: var(--accent); 
        }

        .ach-icon { 
            font-size: 1.5rem; 
            flex-shrink: 0; 
        }

        .ach-text strong { 
            display: block; 
            margin-bottom: 0.3rem; 
            font-size: 0.95rem; 
        }

        .ach-text span { 
            color: var(--muted); 
            font-size: 0.85rem; 
        }

        /* GALLERY */
        #gallery { 
            background: var(--surface); 
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 4/3;
            background: var(--bg);
            border: 1px solid var
